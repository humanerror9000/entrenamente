<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EntrenaMente — Session Test Harness</title>
<style>
  :root {
    --bg:#0C0C10; --card:#18181F; --card2:#1E1E28;
    --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.11);
    --text:#EAE8F2; --text2:#8E8CA8; --text3:#4A4860;
    --violet:#B8A9FF; --violet-deep:#534AB7;
    --teal:#2ECFB8; --green:#52C98A; --coral:#E05C5C; --amber:#F5A623;
    --r:12px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',system-ui,sans-serif;
    padding:24px 16px; min-height:100vh; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:300;
    color:var(--text); margin-bottom:4px; }
  h1 em { color:var(--violet); font-style:italic; }
  .subtitle { font-size:13px; color:var(--text3); margin-bottom:28px; }
  .section { margin-bottom:24px; }
  .section-title { font-size:10px; font-weight:700; letter-spacing:0.10em;
    text-transform:uppercase; color:var(--text3); margin-bottom:10px; }
  .card { background:var(--card); border:1.5px solid var(--border2);
    border-radius:var(--r); padding:16px 18px; margin-bottom:10px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .btn { padding:10px 16px; border-radius:10px; border:none; cursor:pointer;
    font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
    transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
  .btn-violet { background:var(--violet-deep); color:#fff; }
  .btn-violet:hover { background:var(--violet); }
  .btn-teal { background:var(--teal); color:#0C0C10; }
  .btn-ghost { background:transparent; color:var(--text2);
    border:1.5px solid var(--border2); }
  .btn-ghost:hover { border-color:var(--violet); color:var(--violet); }
  .btn-danger { background:var(--coral); color:#fff; }
  .status { font-size:13px; color:var(--text2); line-height:1.7; }
  .status strong { color:var(--text); }
  .status .done { color:var(--green); }
  .status .pending { color:var(--text3); }
  .storage-dump { font-family:'Courier New',monospace; font-size:11px;
    color:var(--teal); background:var(--card2); border:1px solid var(--border2);
    border-radius:8px; padding:12px; white-space:pre-wrap; word-break:break-all;
    max-height:200px; overflow-y:auto; }
  .ex-link { display:inline-flex; align-items:center; gap:6px; padding:9px 14px;
    background:var(--card2); border:1.5px solid var(--border2); border-radius:9px;
    color:var(--text2); text-decoration:none; font-size:13px; font-weight:600;
    transition:all 0.15s; }
  .ex-link:hover { border-color:var(--violet); color:var(--violet); }
  .ex-link.in-session { border-color:var(--teal); color:var(--teal); }
  .tag { display:inline-block; padding:2px 8px; border-radius:6px;
    font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; }
  .tag-done { background:rgba(82,201,138,0.15); color:var(--green); }
  .tag-next { background:rgba(46,207,184,0.15); color:var(--teal); }
  .tag-pending { background:var(--card2); color:var(--text3); }
  hr { border:none; border-top:1px solid var(--border); margin:20px 0; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<h1>Entrena<em>Mente</em></h1>
<div class="subtitle">Session Test Harness — simulate and inspect the daily session flow</div>

<!-- ── Quick Launch ── -->
<div class="section">
  <div class="section-title">Quick launch — simulate session start</div>
  <div class="card">
    <div class="row" id="profile-row">
      <button class="btn btn-ghost" onclick="setProfile('adult')">Adult</button>
      <button class="btn btn-ghost" onclick="setProfile('teen')">Teen</button>
      <button class="btn btn-ghost" onclick="setProfile('child')">Child</button>
      <button class="btn btn-ghost" onclick="setProfile('senior')">Senior</button>
    </div>
    <div class="row">
      <button class="btn btn-ghost" onclick="setDay(0)">Sun</button>
      <button class="btn btn-ghost" onclick="setDay(1)">Mon</button>
      <button class="btn btn-ghost" onclick="setDay(2)">Tue</button>
      <button class="btn btn-ghost" onclick="setDay(3)">Wed</button>
      <button class="btn btn-ghost" onclick="setDay(4)">Thu</button>
      <button class="btn btn-ghost" onclick="setDay(5)">Fri</button>
      <button class="btn btn-ghost" onclick="setDay(6)">Sat</button>
    </div>
    <div class="status" id="queue-preview" style="margin:10px 0 14px;"></div>
    <div class="row">
      <button class="btn btn-violet" onclick="launchSession()">▶ Launch session</button>
      <button class="btn btn-teal" onclick="launchNext()">→ Launch next exercise</button>
    </div>
  </div>
</div>

<!-- ── Session State ── -->
<div class="section">
  <div class="section-title">Current session state</div>
  <div class="card">
    <div class="status" id="session-state"></div>
    <div id="ex-list" style="margin-top:12px;display:flex;flex-direction:column;gap:6px;"></div>
  </div>
</div>

<!-- ── Manual Exercise Links (with ?session=1) ── -->
<div class="section">
  <div class="section-title">Open any exercise in session mode</div>
  <div class="card">
    <div class="row" id="ex-links"></div>
    <div style="font-size:11px;color:var(--text3);margin-top:8px;">These open with ?session=1 so you can test the session-next button directly</div>
  </div>
</div>

<!-- ── localStorage Inspector ── -->
<div class="section">
  <div class="section-title">localStorage inspector</div>
  <div class="card">
    <div class="row">
      <button class="btn btn-ghost" onclick="refreshStorage()">↻ Refresh</button>
      <button class="btn btn-danger" onclick="clearAll()">✕ Clear all EntrenaMente data</button>
      <button class="btn btn-ghost" onclick="clearCompletions()">Clear today's completions</button>
      <button class="btn btn-ghost" onclick="clearQueue()">Clear session queue</button>
    </div>
    <div class="storage-dump" id="storage-dump"></div>
  </div>
</div>

<script>
const EXERCISES = {
  flash:    { name:'Lectura Flash',             url:'lectura_flash_rsvp.html' },
  bloques:  { name:'Lectura por Bloques',        url:'lectura_por_bloques_prototype.html' },
  contra:   { name:'Contrarreloj',               url:'contrarreloj.html' },
  vision:   { name:'Visión Paralela',            url:'vision_paralela.html' },
  saltos:   { name:'Saltos Visuales',            url:'saltos_visuales.html' },
  memoria:  { name:'Memoria Activa',             url:'memoria_activa.html' },
  cats:     { name:'Act. Categorías',            url:'actualizacion_categorias.html' },
  continua: { name:'Act. Continua',              url:'actualizacion_continua.html' },
};

const SCHEDULE = {
  adult:  [['flash','cats','saltos'],['flash','cats','saltos'],['contra','memoria','vision'],['flash','continua','bloques'],['contra','cats','saltos'],['flash','memoria','vision'],['continua','bloques','saltos']],
  teen:   [['flash','cats','saltos'],['flash','cats','saltos'],['contra','memoria','vision'],['flash','continua','bloques'],['contra','cats','saltos'],['flash','memoria','vision'],['continua','bloques','saltos']],
  child:  [['cats','saltos'],['flash','cats'],['cats','saltos'],['flash','cats'],['cats','saltos'],['flash','cats'],['cats','saltos']],
  senior: [['flash','cats','saltos'],['flash','cats','saltos'],['contra','cats','vision'],['flash','saltos','bloques'],['contra','cats','saltos'],['flash','cats','vision'],['saltos','bloques','cats']],
};

const DAY_NAMES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
let _profile = 'adult';
let _day = new Date().getDay();

function today() { return new Date().toISOString().slice(0,10); }

function getCompletions() {
  try { return JSON.parse(localStorage.getItem('em_completions')||'{}'); } catch(e) { return {}; }
}
function getTodayCompletions() { return getCompletions()[today()] || []; }

function setProfile(p) {
  _profile = p;
  document.querySelectorAll('#profile-row .btn').forEach(b => {
    b.classList.toggle('btn-violet', b.textContent.toLowerCase() === p);
    b.classList.toggle('btn-ghost', b.textContent.toLowerCase() !== p);
  });
  updateQueuePreview();
}

function setDay(d) {
  _day = d;
  document.querySelectorAll('.row:nth-child(2) .btn').forEach((b,i) => {
    b.classList.toggle('btn-violet', i === d);
    b.classList.toggle('btn-ghost', i !== d);
  });
  updateQueuePreview();
}

function getQueue() { return (SCHEDULE[_profile]||SCHEDULE.adult)[_day]; }

function updateQueuePreview() {
  const keys = getQueue();
  const done = getTodayCompletions();
  const names = keys.map(k => {
    const ex = EXERCISES[k];
    const isDone = done.includes(k);
    return `<span class="tag ${isDone?'tag-done':'tag-pending'}">${isDone?'✓ ':''} ${ex?.name||k}</span>`;
  });
  document.getElementById('queue-preview').innerHTML =
    `<strong>${DAY_NAMES[_day]} · ${_profile}</strong> &nbsp; ${names.join(' ')}`;
}

function launchSession() {
  const keys = getQueue();
  const done = getTodayCompletions();
  const queue = { keys, date: today(), profile: _profile };
  try { localStorage.setItem('em_session_queue', JSON.stringify(queue)); } catch(e) {}
  // Also set em_user so exercises know the profile
  try {
    const existing = JSON.parse(localStorage.getItem('em_user')||'{}');
    localStorage.setItem('em_user', JSON.stringify({...existing, profile:_profile, name: existing.name||'Test'}));
  } catch(e) {}
  const remaining = keys.filter(k => !done.includes(k));
  if(remaining.length === 0) { alert('All exercises already completed today. Clear completions first.'); return; }
  const first = EXERCISES[remaining[0]];
  window.location.href = first.url + '?session=1';
}

function launchNext() {
  try {
    const q = JSON.parse(localStorage.getItem('em_session_queue')||'null');
    const done = getTodayCompletions();
    if(!q) { alert('No session queue found. Use Launch session first.'); return; }
    const remaining = q.keys.filter(k => !done.includes(k));
    if(remaining.length === 0) { window.location.href = 'index.html?done=session'; return; }
    window.location.href = EXERCISES[remaining[0]].url + '?session=1';
  } catch(e) { alert('Error: ' + e.message); }
}

function refreshStorage() {
  // Session state
  const q = JSON.parse(localStorage.getItem('em_session_queue')||'null');
  const done = getTodayCompletions();
  const streak = JSON.parse(localStorage.getItem('em_streak')||'{"count":0}');

  let stateHtml = `<strong>Today:</strong> ${today()} &nbsp; <strong>Streak:</strong> ${streak.count} days<br>`;
  if(q) {
    const remaining = q.keys.filter(k => !done.includes(k));
    stateHtml += `<strong>Queue:</strong> ${q.keys.join(', ')} (${q.profile}, ${q.date})<br>`;
    stateHtml += `<strong>Completed today:</strong> ${done.length > 0 ? done.join(', ') : 'none'}<br>`;
    stateHtml += `<strong>Remaining:</strong> ${remaining.length > 0 ? remaining.join(', ') : '<span class="done">All done! 🔥</span>'}`;
  } else {
    stateHtml += '<span class="pending">No session queue in localStorage</span>';
  }
  document.getElementById('session-state').innerHTML = stateHtml;

  // Exercise list with status tags
  const list = document.getElementById('ex-list');
  list.innerHTML = '';
  if(q) {
    q.keys.forEach((k, i) => {
      const ex = EXERCISES[k];
      const isDone = done.includes(k);
      const isNext = !isDone && done.length === i || (!isDone && q.keys.slice(0,i).every(k2=>done.includes(k2)));
      const tag = isDone ? '<span class="tag tag-done">✓ done</span>' :
                  isNext ? '<span class="tag tag-next">← next</span>' :
                           '<span class="tag tag-pending">pending</span>';
      list.innerHTML += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:13px;color:${isDone?'var(--text3)':'var(--text)'};flex:1;">${i+1}. ${ex?.name||k}</span>
        ${tag}
        <a href="${ex?.url}?session=1" class="ex-link" style="font-size:12px;padding:6px 10px;">Open ↗</a>
      </div>`;
    });
  }

  // Exercise links
  const linksEl = document.getElementById('ex-links');
  linksEl.innerHTML = '';
  Object.entries(EXERCISES).forEach(([key, ex]) => {
    const isDone = done.includes(key);
    linksEl.innerHTML += `<a href="${ex.url}?session=1" class="ex-link ${isDone?'':'in-session'}">${ex.name}${isDone?' ✓':' →'}</a>`;
  });

  // Storage dump
  const keys = ['em_user','em_session_queue','em_completions','em_streak'];
  const dump = keys.map(k => {
    const v = localStorage.getItem(k);
    if(!v) return `${k}: (empty)`;
    try { return `${k}:\n${JSON.stringify(JSON.parse(v), null, 2)}`; }
    catch(e) { return `${k}: ${v}`; }
  }).join('\n\n');
  document.getElementById('storage-dump').textContent = dump;
}

function clearAll() {
  if(!confirm('Clear all EntrenaMente localStorage?')) return;
  ['em_user','em_session_queue','em_completions','em_streak'].forEach(k => localStorage.removeItem(k));
  refreshStorage();
}
function clearCompletions() {
  try {
    const all = getCompletions();
    delete all[today()];
    localStorage.setItem('em_completions', JSON.stringify(all));
  } catch(e) {}
  refreshStorage(); updateQueuePreview();
}
function clearQueue() {
  localStorage.removeItem('em_session_queue');
  refreshStorage();
}

// Init
setProfile('adult');
setDay(new Date().getDay());
refreshStorage();
</script>
</body>
</html>
